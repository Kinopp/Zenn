title: "実践的OracleSQL徹底演習（プレリリース中）"
summary: |-
  プレリリース中です。
  問題数を充実させ、正式リリースする予定です。
  それまで予告なしに問題を増やしていきます。
  ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー
  SQLを学びたいけど、DBの設定が面倒…」「教科書のクエリは実務でどう使うの？」そんな悩みを抱えるすべての初級エンジニアから「複雑なクエリを書くにはどうすればよいのか、ヒントを得たい」という上級エンジニア。Oracleが提供する最新環境「Oracle FreeSQL」を使い倒し、現場で通用する「本物のSQL力」を叩き込むトレーニングを公開します！

  ✨ 本コンテンツの3つの「規格外」
  1. 準備0秒、ブラウザだけで即開始
     Oracle FreeSQLなら、最初からリッチなサンプルデータが揃っています。面倒なインストール作業は一切なし。開いた瞬間、そこがあなたの練習場です。

  2. 圧倒的な「打撃練習」ボリューム
     初心者向けの基本操作から、ベテランも唸る複雑なクエリまで。質と量を両立した問題集を徹底的に解くことで、SQLを「知識」ではなく「指先」に覚えさせます。

  3. 「現場の知恵」を凝縮
     ただの答え合わせでは終わりません。「なぜこの書き方をするのか？」「開発現場ではどう使い分けるのか？」経験者の視点による解説を随所に盛り込んでいます。

  「AI時代のSQL活用」への第一歩を、ここから踏み出しませんか？
